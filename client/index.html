<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>منصة التعليم الثانوي بالكويت</title>
    <link rel="alternate" hreflang="ar-kw" href="https://kuwait-secondary-school.manus.space" />
    <link rel="alternate" hreflang="ar" href="https://kuwait-secondary-school.manus.space" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    
    <!-- Schema.org structured data for local business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "منصة ثانوي علمي بالكويت",
      "description": "منصة تعليمية متخصصة في توفير مذكرات ومراجعات علمية شاملة للمرحلة الثانوية في الكويت",
      "url": "https://kuwait-secondary-school.manus.space",
      "areaServed": {
        "@type": "Country",
        "name": "الكويت"
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KW",
        "addressLocality": "الكويت"
      },
      "inLanguage": "ar-KW",
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student",
        "audienceType": "طلاب المرحلة الثانوية"
      }
    }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
